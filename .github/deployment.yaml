name: 'Deployment'
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
  push:
    branches:
      - main

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      # Set up Java
      - name: 'Set up JDK'
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '25'

      # Build the Maven project
      - name: 'Build with Maven'
        run: mvn clean package

      # Copy the executable JAR to the root directory
      - name: 'Copy executable JAR'
        run: |
          JAR_FILE=$(find . -name "*.jar" -not -name "*-sources.jar" -not -name "*-javadoc.jar" | head -n 1)
          cp "$JAR_FILE" ./application.jar

      # Configure Git
      - name: 'Configure Git'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Commit and push the JAR file
      - name: 'Commit and Push JAR'
        run: |
          git add application.jar
          git commit -m "Add built executable JAR"
          git push origin main

