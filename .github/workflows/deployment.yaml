name: Deployment

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
  push:
    branches:
      - main

jobs:
  deployment:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}
          ssh-key: ${{ secrets.DEPLOY_KEY }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Windows release
        shell: pwsh
        run: |
          ./mvnw.cmd -B clean verify -Pwindows-release

      - name: Copy zipped installer
        shell: pwsh
        run: |
          $zip = "Application/target/zipped/Application-app-image.zip"
          if (-not (Test-Path $zip)) {
            Write-Error "Installer not found at $zip"
            exit 1
          }
          Copy-Item $zip installer-windows.zip -Force

      - name: Configure Git
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push installer
        shell: pwsh
        run: |
          git add installer-windows.zip README.md
          git commit -m "Add zipped installer and update README [skip ci]"
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No changes to commit."
            exit 0
          }
          git push origin HEAD:${{ github.event.inputs.branch || 'main' }}