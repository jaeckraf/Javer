name: 'Deployment'
on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'main'
  push:
    branches:
      - main

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: 'Set up JDK'
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: 'Build with Maven'
        run: mvn clean package

      - name: 'Copy shaded JAR'
        run: |
          SHADED_JAR=$(find ./target -name "*-shaded.jar" | head -n 1)
          cp "$SHADED_JAR" ./application-shaded.jar

      - name: 'Configure Git'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 'Commit and Push Changes'
        run: |
          git add application-shaded.jar README.md
          git commit -m "Add shaded JAR and update README [skip ci]" || exit 0
          git push origin HEAD:${{ github.event.inputs.branch || 'main' }}