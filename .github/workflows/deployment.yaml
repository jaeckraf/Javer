name: Deployment

on:
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
      version:
        description: Release version, e.g. v1.0.0
        required: true
        default: v1.0.0

jobs:
  deployment:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || 'main' }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build Windows release
        shell: pwsh
        run: |
          ./mvnw.cmd -B clean verify -Pwindows-release

      - name: Copy zipped installer
        shell: pwsh
        run: |
          $zip = "Application/target/zipped/Application-app-image.zip"
          if (-not (Test-Path $zip)) {
            Write-Error "Installer not found at $zip"
            exit 1
          }
          Copy-Item $zip installer-windows.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: ${{ github.event.inputs.version }}
          files: installer-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}